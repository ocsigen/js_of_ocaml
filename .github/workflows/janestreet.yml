name: janestreet

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Prime the caches every Monday
    - cron: 0 1 * * MON

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    env:
      # The dune-workspace generated by tools/ci_setup keys on these
      # variables to select the backend the inline tests run under.
      JS_OF_OCAML: ${{ matrix.backend == 'js' }}
      WASM_OF_OCAML: ${{ matrix.backend == 'wasm' }}
      OXCAML_OPAM_REPO_REF: d89747aa6e7b9f44d6cc844dca5b5e7c8a90716f

    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: js
            ocaml-name: ""
            ocaml-compiler: "5.3"
          - backend: js
            ocaml-name: "OxCaml"
            ocaml-compiler: "ocaml-variants.5.2.0+ox"
          - backend: wasm
            ocaml-name: ""
            ocaml-compiler: "5.3"
          - backend: wasm
            ocaml-name: "OxCaml"
            ocaml-compiler: "ocaml-variants.5.2.0+ox"

    runs-on: ubuntu-latest

    name: ${{ matrix.backend }} / ${{ matrix.ocaml-name != '' && matrix.ocaml-name || matrix.ocaml-compiler }}

    steps:
      - name: Update apt cache
        run: sudo apt-get update

      - name: Checkout tree
        uses: actions/checkout@v7
        with:
          path: js_of_ocaml

      - name: Checkout Jane Street opam repository
        if: ${{ ! endsWith(matrix.ocaml-compiler, '+ox') }}
        uses: actions/checkout@v7
        with:
          repository: janestreet/opam-repository
          ref: 2819773f29b6f6c14b918eae3cb40c8ff6b22d0e
          path: janestreet/opam-repository

      - name: Checkout OxCaml opam repository
        if: ${{ endsWith(matrix.ocaml-compiler, '+ox') }}
        uses: actions/checkout@v7
        with:
          repository: oxcaml/opam-repository
          ref: ${{ env.OXCAML_OPAM_REPO_REF }}
          path: janestreet/opam-repository

      - name: Set-up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.backend == 'wasm' && 'v26.0.0-v8-canary20260216631fb6e5ef' || 'latest' }}

      - name: Set-up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
        if: ${{ ! endsWith(matrix.ocaml-compiler, '+ox') }}

      - name: Set-up OxCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          opam-repositories: |
            default: https://github.com/ocaml/opam-repository.git
            ox: https://github.com/oxcaml/opam-repository.git#${{ env.OXCAML_OPAM_REPO_REF }}
        if: ${{ endsWith(matrix.ocaml-compiler, '+ox') }}

      - name: Set-up Binaryen
        uses: Aandreba/setup-binaryen@v1.0.0
        with:
          token: ${{ github.token }}

      - name: Pin js_of_ocaml
        working-directory: ./js_of_ocaml
        run: opam pin . -n --with-version 6.0.1+ox

      - name: Pin specific packages for OxCaml
        if: ${{ endsWith(matrix.ocaml-compiler, '+ox') }}
        run: |
          opam pin add opam-core -n 2.5.1+ox
          opam pin add gen_js_api -n 1.1.2+ox
          opam pin add zarith -n 1.14+ox
          opam pin add sedlex -n 3.6+ox

      # Add some packages to the opam invariant;
      # opam makes wrong choices otherwise
      - name: Hold some packages
        if: ${{ endsWith(matrix.ocaml-compiler, '+ox') }}
        run: |
          opam install gen_js_api zarith opam-format
          opam switch set-invariant --formula '["ocaml-variants" {= "5.2.0+ox"} "zarith" "gen_js_api" "opam-format"]'

      - name: Checkout Jane Street packages
        run: |
          opam repo add js janestreet/opam-repository
          opam install opam-format
          opam exec -- dune exec --root js_of_ocaml tools/ci_setup.exe janestreet js_of_ocaml

      - name: Install js_of_ocaml and its test dependencies
        id: install
        working-directory: ./js_of_ocaml
        run: opam install . -t

      # Bonsai's js test scaffolding requires the deasync npm package,
      # resolved from janestreet/node_modules.
      - name: Install deasync (Bonsai js tests)
        if: ${{ matrix.backend == 'js' }}
        working-directory: ./janestreet
        run: npm install deasync

      - name: Run Base tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/base
        run: opam exec -- dune runtest

      - name: Run Base bigstring tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/base_bigstring
        run: opam exec -- dune runtest

      - name: Run Core tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/core
        run: opam exec -- dune runtest

      - name: Run Bignum tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bignum
        run: opam exec -- dune runtest

      - name: Run Bin_prot tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bin_prot
        run: opam exec -- dune runtest

      - name: Run String_dict tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/string_dict
        run: opam exec -- dune runtest

      - name: Run Zarith tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/zarith_stubs_js
        run: opam exec -- dune runtest

      - name: Run Virtual_dom tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/virtual_dom
        run: opam exec -- dune runtest

      - name: Run Bonsai tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bonsai_test
        run: opam exec -- dune runtest

      - name: Run Bonsai web tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bonsai_web_test
        run: opam exec -- dune runtest

      - name: Run Bonsai web components' tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bonsai_web_components
        run: opam exec -- dune runtest

      # The release profile additionally exercises whole-program compilation
      - name: Run Bonsai tests (release profile)
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bonsai_test
        run: opam exec -- dune runtest --profile release

      - name: Run Bonsai web tests (release profile)
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bonsai_web_test
        run: opam exec -- dune runtest --profile release

      - name: Run Bonsai web components' tests (release profile)
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        working-directory: ./janestreet/lib/bonsai_web_components
        run: opam exec -- dune runtest --profile release
